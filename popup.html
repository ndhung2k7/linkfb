<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    
    h2 {
      margin: 0 0 20px 0;
      color: #333;
      font-size: 20px;
      text-align: center;
    }
    
    .status-box {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .status {
      font-size: 18px;
      font-weight: bold;
    }
    
    .status.running {
      color: #4caf50;
    }
    
    .status.stopped {
      color: #f44336;
    }
    
    .control-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    
    input[type="number"] {
      width: 100%;
      padding: 8px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    input[type="number"]:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
    }
    
    .btn-start {
      background: #4caf50;
      color: white;
    }
    
    .btn-start:hover {
      background: #45a049;
      transform: translateY(-1px);
    }
    
    .btn-stop {
      background: #f44336;
      color: white;
    }
    
    .btn-stop:hover {
      background: #da190b;
      transform: translateY(-1px);
    }
    
    .btn-download {
      background: #2196f3;
      color: white;
    }
    
    .btn-download:hover {
      background: #0b7dda;
      transform: translateY(-1px);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .info {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #e0e0e0;
    }
    
    .stats {
      background: #f9f9f9;
      padding: 10px;
      border-radius: 6px;
      margin-top: 15px;
      font-size: 12px;
    }
    
    .stats p {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🎬 Facebook Reels Auto Scroll</h2>
    
    <div class="status-box">
      <div>Trạng thái:</div>
      <div class="status stopped" id="status">Stopped</div>
    </div>
    
    <div class="control-group">
      <label>⏱️ Delay giữa mỗi lần lướt (giây):</label>
      <input type="number" id="delayMin" placeholder="Tối thiểu" value="3" step="0.5" min="1">
      <input type="number" id="delayMax" placeholder="Tối đa" value="10" step="0.5" min="2" style="margin-top: 8px;">
    </div>
    
    <button class="btn-start" id="startBtn">▶ Start</button>
    <button class="btn-stop" id="stopBtn" disabled>⏸ Stop</button>
    <button class="btn-download" id="downloadBtn">📥 Download Links (.txt)</button>
    
    <div class="stats">
      <p>📊 Thống kê:</p>
      <p id="statsCount">Số link đã thu thập: 0</p>
      <p id="statsUnique">Link unique: 0</p>
    </div>
    
    <div class="info">
      💡 Mẹo: Mở tab Facebook Reels và bấm Start
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
